<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Animation Samples</title>
<style>
    body {
        margin: 0;
        background: linear-gradient(135deg, #322b2d 0%, #151314 100%);
        color: #fff;
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        padding: 40px 20px;
        min-height: 100vh;
        letter-spacing: 0.05em;
    }
    .demo-container { 
        margin-bottom: 50px; 
        background: rgba(255,255,255,0.03); 
        padding: 30px; 
        border-radius: 16px; 
        border: 1px solid rgba(255,255,255,0.08); 
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    h2 { 
        font-weight: 300; 
        font-size: 13px; 
        letter-spacing: 0.1em; 
        color: rgba(255,255,255,0.5); 
        margin-bottom: 24px; 
        border-bottom: 1px solid rgba(255,255,255,0.05);
        padding-bottom: 10px;
    }
    .text-block { 
        font-size: 16px; 
        line-height: 1.8; 
        font-weight: 500; 
    }
    
    /* 共通カラー */
    .t-pink { color: #e1a6b4; font-weight: bold; }
    .t-gold { color: #dbc09e; font-weight: bold; }

    /* ベーステキスト（普通の文章部分）のゆっくりとしたフェードイン */
    .base-text { opacity: 0; transform: translateY(15px); }
    .is-playing .base-text {
        animation: baseFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    @keyframes baseFade {
        to { opacity: 1; transform: translateY(0); }
    }

    /* -------------------------------------
       1. グラス・クリアエフェクト (Blur Reveal)
       ------------------------------------- */
    .blur-reveal-target {
        display: inline-block;
        opacity: 0;
        filter: blur(10px);
        transform: scale(0.95);
    }
    /* 普通の文字が現れた「0.8秒後」に起動 */
    .is-playing .blur-reveal-target {
        animation: blurRevealAnim 1.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.8s;
    }
    @keyframes blurRevealAnim {
        0% { opacity: 0; filter: blur(10px); transform: scale(0.95); }
        40% { opacity: 0.5; filter: blur(5px); transform: scale(0.98); }
        100% { opacity: 1; filter: blur(0); transform: scale(1); }
    }

    /* -------------------------------------
       2. ルミナス・グロウ (Luminous Glow)
       ------------------------------------- */
    .glow-reveal-target {
        display: inline-block;
        color: rgba(255,255,255,0.2); /* 最初は暗い色 */
        text-shadow: none;
        transition: color 1s ease;
    }
    .is-playing .glow-reveal-target {
        animation: glowRevealAnim 2.0s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.8s;
    }
    @keyframes glowRevealAnim {
        0% { color: rgba(255,255,255,0.2); text-shadow: none; }
        40% { color: #dbc09e; text-shadow: 0 0 20px rgba(219, 192, 158, 0.9); }
        100% { color: #dbc09e; text-shadow: 0 0 8px rgba(219, 192, 158, 0.5); }
    }

    /* -------------------------------------
       3. フローティング・ブレス (Scale & Float)
       ------------------------------------- */
    .float-breathe-target {
        display: inline-block;
        opacity: 0;
        transform: translateY(15px);
    }
    .is-playing .float-breathe-target {
        /* バネのような動きでポンッと浮き上がる (cubic-bezier) */
        animation: floatBreatheAnim 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.8s;
    }
    @keyframes floatBreatheAnim {
        0% { opacity: 0; transform: translateY(15px) scale(0.95); }
        100% { opacity: 1; transform: translateY(-3px) scale(1.05); }
    }

    /* リプレイボタン */
    .replay-btn {
        display: inline-block;
        margin-bottom: 40px; 
        padding: 12px 24px; 
        background: rgba(255,255,255,0.05); 
        color: #fff; 
        border: 1px solid rgba(255,255,255,0.3); 
        border-radius: 30px; 
        cursor: pointer; 
        font-size: 14px;
        transition: background 0.3s ease;
    }
    .replay-btn:hover { background: rgba(255,255,255,0.15); }

</style>
</head>
<body>

<div style="text-align: center;">
    <button class="replay-btn" onclick="playAll()">↻ アニメーションを再読み込みする</button>
</div>

<!-- ======================= サンプル1 ======================= -->
<div class="demo-container anim-group">
    <h2>パターン①：グラスクリア（すりガラスからピントが合う）</h2>
    <div class="text-block base-text">
        ちゃんとやっているのに、変わらない。<br>
        そんなふうに感じたことは<span class="t-pink blur-reveal-target">ありませんか？</span>
    </div>
</div>

<!-- ======================= サンプル2 ======================= -->
<div class="demo-container anim-group">
    <h2>パターン②：ルミナスグロウ（暗狩りから光が灯る）</h2>
    <div class="text-block base-text">
        それでも変わらない理由は、<br>
        <span class="t-gold glow-reveal-target">身体の設計図が違うから。</span>
    </div>
</div>

<!-- ======================= サンプル3 ======================= -->
<div class="demo-container anim-group">
    <h2>パターン③：フローティング（鼓動するように手前に浮き出る）</h2>
    <div class="text-block base-text">
        今年の夏、ビキニを着るのは<br>
        “特別な人”じゃありません。<br>
        <span class="t-gold float-breathe-target">設計図を知った人だけです。</span>
    </div>
</div>

<script>
    // 全てのアニメーションクラスを一度外して、再度付け直すことでリプレイする
    function playAll() {
        const groups = document.querySelectorAll('.anim-group');
        groups.forEach(g => {
            g.classList.remove('is-playing');
            void g.offsetWidth; // リフローを強制してアニメーションをリセット
            g.classList.add('is-playing');
        });
    }
    
    // ロード時に初回再生
    window.onload = playAll;
</script>
</body>
</html>
